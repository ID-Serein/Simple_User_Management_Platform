<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>帮助中心</title>
</head>
<body>
    <h1>帮助中心</h1>
    <p>欢迎来到用户管理系统帮助中心。</p>

    <h2>功能介绍</h2>
    <ul>
        <li><strong>登录：</strong>使用用户名和密码登录系统</li>
        <li><strong>注册：</strong>新用户可自行注册账号</li>
        <li><strong>搜索：</strong>通过用户名或邮箱搜索其他用户</li>
        <li><strong>个人中心：</strong>查看和修改个人资料、余额充值</li>
        <li><strong>上传头像：</strong>上传个人头像图片</li>
    </ul>

    <h2>常见问题</h2>
    <h3>如何修改密码？</h3>
    <p>请联系管理员修改密码。</p>

    <h3>充值多久到账？</h3>
    <p>充值成功后立即到账，可在个人中心查看余额变化。</p>

    <h3>忘记密码怎么办？</h3>
    <p>请联系管理员重置密码。</p>

    <h2>联系方式</h2>
    <p>如有其他问题，请联系系统管理员。</p>
</body>
</html>
