<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}用户管理系统{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <nav class="navbar">
        <div class="nav-brand">用户管理系统</div>
        <div class="nav-menu">
            {% if session.get('username') %}
            <span class="nav-welcome">欢迎，{{ session.get('username') }}</span>
            <a href="{{ url_for('upload') }}" class="nav-link">上传头像</a>
            <a href="{% if nav_user_id %}{{ url_for('profile', user_id=nav_user_id) }}{% else %}{{ url_for('index') }}{% endif %}" class="nav-link">个人中心</a>
            <a href="{{ url_for('ping') }}" class="nav-link">Ping测试</a>
            <a href="{{ url_for('xml_import') }}" class="nav-link">XML导入</a>
            <form method="post" action="{{ url_for('logout') }}" class="nav-form">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                <button type="submit" class="nav-link nav-button">退出</button>
            </form>
            {% else %}
            <a href="{{ url_for('login') }}" class="nav-link">登录</a>
            <a href="{{ url_for('register') }}" class="nav-link">注册</a>
            {% endif %}
        </div>
    </nav>
    <main class="container">
        {% block content %}{% endblock %}
    </main>
</body>
</html>
