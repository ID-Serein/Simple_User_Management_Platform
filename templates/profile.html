{% extends "base.html" %}

{% block title %}个人中心 - 用户管理系统{% endblock %}

{% block content %}
<div class="card">
    <h2 class="card-title">个人中心</h2>
    <div class="user-info-list">
        <div class="info-row">
            <span class="info-label">ID</span>
            <span class="info-value">{{ user.id }}</span>
        </div>
        <div class="info-row">
            <span class="info-label">用户名</span>
            <span class="info-value">{{ user.username }}</span>
        </div>
        <div class="info-row">
            <span class="info-label">邮箱</span>
            <span class="info-value">{{ user.email or "未设置" }}</span>
        </div>
        <div class="info-row">
            <span class="info-label">手机</span>
            <span class="info-value">{{ user.phone or "未设置" }}</span>
        </div>
        <div class="info-row">
            <span class="info-label">角色</span>
            <span class="info-value">{{ user.role }}</span>
        </div>
        <div class="info-row">
            <span class="info-label">余额</span>
            <span class="info-value">{{ user.balance }}</span>
        </div>
    </div>
</div>

<div class="card">
    <h2 class="card-title">充值</h2>
    <form method="post" action="{{ url_for('recharge') }}">
        <input type="hidden" name="user_id" value="{{ user.id }}">
        <div class="form-group">
            <label for="amount">充值金额</label>
            <input type="text" id="amount" name="amount" class="form-input" placeholder="请输入充值金额" required>
        </div>
        <button type="submit" class="btn btn-primary btn-block">充值</button>
    </form>
</div>
{% endblock %}
