{% extends "base.html" %}

{% block title %}用户登录 - 用户管理系统{% endblock %}

{% block content %}
<div class="card login-card">
    <h2 class="card-title">用户登录</h2>
    {% if msg %}
    <div class="success-message">{{ msg }}</div>
    {% endif %}
    {% if error %}
    <div class="error-message">{{ error }}</div>
    {% endif %}
    <form method="post" action="{{ url_for('login') }}">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <div class="form-group">
            <label for="username">用户名</label>
            <input type="text" id="username" name="username" class="form-input" placeholder="请输入用户名" maxlength="64" autocomplete="username" required>
        </div>
        <div class="form-group">
            <label for="password">密码</label>
            <input type="password" id="password" name="password" class="form-input" placeholder="请输入密码" maxlength="128" autocomplete="current-password" required>
        </div>
        <button type="submit" class="btn btn-primary btn-block">登录</button>
    </form>
</div>
{% endblock %}
